name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Android SDK platform-36
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/platforms/android-36
          key: android-sdk-platform-36-v1

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web assets into Android
        run: |
          mkdir -p android/app/src/main/assets/public
          npx cap copy android

      - name: Install Android SDK platform 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;35.0.0" "platform-tools" 2>&1 | tail -3
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShonCeramics-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Shon Ceramics APK #${{ github.run_number }}"
          body: |
            ## Shon Ceramics Android App

            **Auto-updates built in** — this APK loads from the live website.
            New features appear automatically, no reinstall needed.

            **Alarm notifications:**
            - Rings even when phone is on silent
            - Bypasses Do Not Disturb
            - Aggressive vibration pattern
            - Stays on screen until dismissed
            - Red LED flash

            ### Install
            1. Download `app-debug.apk` below
            2. Open on your Android phone
            3. Tap Install (allow Unknown Sources if prompted)
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false

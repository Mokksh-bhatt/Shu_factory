name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache Android SDK platform-36
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/platforms/android-36
          key: android-sdk-platform-36-v1

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      # Deploy updated web app to Firebase Hosting so all APKs auto-update
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        continue-on-error: true

      - name: Copy web assets into APK (offline fallback)
        run: |
          mkdir -p android/app/src/main/assets/public
          npx cap copy android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate launcher icons from logo
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48;  fg=108;;
              hdpi)    size=72;  fg=162;;
              xhdpi)   size=96;  fg=216;;
              xxhdpi)  size=144; fg=324;;
              xxxhdpi) size=192; fg=432;;
            esac
            dir="android/app/src/main/res/mipmap-${density}"
            convert public/images.jpg -resize "${size}x${size}^" -gravity Center -extent "${size}x${size}" "$dir/ic_launcher.png"
            convert public/images.jpg -resize "${size}x${size}^" -gravity Center -extent "${size}x${size}" \
              \( +clone -alpha transparent -background none \
                 -fill white -draw "circle $((size/2)),$((size/2)) $((size/2)),1" \) \
              -alpha set -compose DstIn -composite "$dir/ic_launcher_round.png"
            pad=$((fg * 15 / 100))
            inner=$((fg - pad * 2))
            convert -size "${fg}x${fg}" xc:"#0f0f11" \
              \( public/images.jpg -resize "${inner}x${inner}^" -gravity Center -extent "${inner}x${inner}" \) \
              -gravity Center -composite "$dir/ic_launcher_foreground.png"
          done

      - name: Install Android SDK platform 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;35.0.0" "platform-tools" 2>&1 | tail -3
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShonCeramics-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Shon Ceramics APK #${{ github.run_number }}"
          body: |
            ## Shon Ceramics Android App

            **Install once — updates automatically.**
            Workers install this APK one time. All future feature updates
            happen silently in the background via Firebase — no reinstall ever needed.

            **Alarm notifications:**
            - Rings even when phone is on silent
            - Bypasses Do Not Disturb
            - Aggressive vibration
            - Stays on screen until dismissed
            - Red LED flash

            ### Install
            1. Download `app-debug.apk` below
            2. Open on Android phone → tap Install
            3. Allow "Unknown Sources" if prompted
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false

name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK platform 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "platform-tools" 2>&1 | tail -5
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: |
          mkdir -p android/app/src/main/assets/public
          npx cap copy android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShonCeramics-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Shon Ceramics APK #${{ github.run_number }}"
          body: |
            ## Shon Ceramics Android App

            **Alarm notifications active:**
            - Rings even when phone is on silent
            - Bypasses Do Not Disturb
            - Aggressive vibration pattern
            - Stays on screen until dismissed
            - Red LED flash

            ### Install
            1. Download `app-debug.apk` below
            2. Open file on your Android phone
            3. Tap Install (allow Unknown Sources if prompted)
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
